<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJWeb</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0f172a;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.container{
    background:#1e293b;
    padding:40px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
    text-align:center;
    width:320px;
}

h1{
    color:white;
    margin-bottom:25px;
}

.btn{
    display:block;
    text-decoration:none;
    padding:14px;
    margin:10px 0;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    font-size:16px;
    transition:0.25s;
}

.btn:hover{
    background:#2563eb;
    transform:scale(1.04);
    box-shadow:0 0 10px rgba(59,130,246,0.6);
}
</style>
</head>

<body>

<div class="container">
<h1>Navigation</h1>

<a class="btn" href="server">Server</a>

</div>

</body>
</html>
