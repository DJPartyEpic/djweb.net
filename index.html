<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Buttons</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#4f46e5,#9333ea);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:16px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    text-align:center;
    width:320px;
}

h1{
    margin-bottom:25px;
}

.btn{
    display:block;
    text-decoration:none;
    padding:14px;
    margin:10px 0;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    font-size:16px;
    transition:0.25s;
}

.btn:hover{
    background:#3730a3;
    transform:scale(1.04);
}
</style>
</head>

<body>

<div class="container">
<h1>Navigation</h1>

<a class="btn" href="home.html">Home</a>
<a class="btn" href="start.html">Start</a>
<a class="btn" href="stop.html">Stop</a>

</div>

</body>
</html>
